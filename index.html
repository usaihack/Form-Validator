<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.LOGIN_//</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
        <div class="container">
            <div class="heading">AUTH_REQ://</div>
            <div class="inputs">
                <div class="input-group">
                    <label>>_ sys.user_id</label>
                    <input class="name" type="text" placeholder="ROOT" required spellcheck="false" autocomplete="off">
                    <p class="validName"></p>
                </div>
                <div class="input-group">
                    <label>>_ sys.user_mail</label>
                    <input class="email" type="email" placeholder="root@localhost" required spellcheck="false" autocomplete="off">
                    <p class="validEmail"></p>
                </div>
                <div class="input-group">
                    <label>>_ sys.pass_key</label>
                    <input class="pass" type="password" placeholder="********" required spellcheck="false">
                    <p class="validPass"></p>
                </div>
                <div class="input-group">
                    <label>>_ sys.pass_verify</label>
                    <input class="cpass" type="password" placeholder="********" required spellcheck="false">
                    <p class="matchPass"></p>
                </div>
            </div>
            <div class="submit">
                <button id="btn">[ EXECUTE ]</button>
            </div>
        </div>
    </div>

    <div class="alert">
        <div class="alertP">
            <p id="alertText">ERR_CODE: INVALID_INPUT</p>
            <button id="resetbtn">[ ACKNOWLEDGE ]</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
